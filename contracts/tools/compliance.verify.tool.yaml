version: 1
tool_id: compliance.verify@v1
description: "Deterministic CSDDD compliance verification tool."
category: compliance
entity: VerificationReport
operation: verify
side_effect: read
risk_level: low
requires_approval: false
idempotent: true
supports_dry_run: true

input_schema:
  type: object
  required: [rootCid]
  properties:
    rootCid:
      type: string
    graph:
      type: object
    vcsByCid:
      type: object
    technicalClaims:
      type: array
    rulepackId:
      type: string
    rulepackIds:
      type: array
      items:
        type: string
    rulepackPath:
      type: string
    rulepackPaths:
      type: array
      items:
        type: string
    rulepackIndexPath:
      type: string

output_schema:
  type: object
  required: [status, success, message, rules, summary, meta]
  properties:
    status:
      type: string
      enum: [pending, running, done, error]
    success:
      type: [boolean, "null"]
    message:
      type: string
    rules:
      type: array
      items:
        type: object
    summary:
      type: object
    regulations:
      type: array
      items:
        type: object
    meta:
      type: object
