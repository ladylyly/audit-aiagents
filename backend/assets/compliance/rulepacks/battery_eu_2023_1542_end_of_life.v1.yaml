schemaVersion: "1.1"
regulation:
  id: "eu.regulation.2023.1542"
  shortName: "Battery Regulation"
  citation: "Regulation (EU) 2023/1542"
  sourcePdf: "thesis/sources/Regulation (EU) 2023:1542 (Battery Regulation) Official Journal text.pdf"
  notes:
    - "Phase 3 waste-management, collection, treatment, re-use, shipment, and reporting duties for Articles 54 to 75."
    - "Article 71 recycling and recovery thresholds are encoded with deterministic ratio calculations."
    - "Commission- and Member-State-only provisions are preserved as entity-level exclusions to keep the chapter structurally complete."

rulepack:
  id: "battery_eu_2023_1542_end_of_life_v1"
  version: "0.1.0"
  status: "draft"

chapters:
  - id: "battery.epr"
    title: "Extended Producer Responsibility and Registration"
    articleStart: 54
    articleEnd: 58
  - id: "battery.collection"
    title: "Collection, Take-Back, and Waste Management Chain"
    articleStart: 59
    articleEnd: 69
  - id: "battery.treatment_reporting"
    title: "Treatment, Recycling, Re-use, Information, and Reporting"
    articleStart: 70
    articleEnd: 75

rules:
  - id: "battery.art54"
    articleRef: "Article 54"
    title: "Competent authorities are designated by Member States"
    obligationType: "competent_authority"
    encodable: true
    entityLevel: false
    notApplicableReason: "Article 54 addresses Member State designation and supervision of competent authorities."

  - id: "battery.art55.2"
    articleRef: "Article 55"
    paragraphRef: "Art 55(2)"
    title: "Producer is registered before making batteries available on the market"
    obligationType: "registration"
    encodable: true
    checkType: "boolean"
    applicability:
      all:
        - field: "claims.battery.operator_role"
          op: "=="
          value: "producer"
    evidenceRequired:
      - "claims.battery.producer_registered"

  - id: "battery.art55.3"
    articleRef: "Article 55"
    paragraphRef: "Art 55(3)"
    title: "Producer registration application contains the required information"
    obligationType: "registration_data"
    encodable: true
    checkType: "boolean"
    applicability:
      all:
        - field: "claims.battery.operator_role"
          op: "=="
          value: "producer"
    evidenceRequired:
      - "claims.battery.producer_registration_application_complete"

  - id: "battery.art55.9"
    articleRef: "Article 55"
    paragraphRef: "Art 55(9)"
    title: "Producer registration number has been issued"
    obligationType: "registration_number"
    encodable: true
    checkType: "boolean"
    applicability:
      all:
        - field: "claims.battery.operator_role"
          op: "=="
          value: "producer"
    evidenceRequired:
      - "claims.battery.producer_registration_number_present"

  - id: "battery.art55.12"
    articleRef: "Article 55"
    paragraphRef: "Art 55(12)"
    title: "Changes to producer registration are notified without undue delay"
    obligationType: "registration_update"
    encodable: true
    checkType: "boolean"
    applicability:
      all:
        - field: "claims.battery.operator_role"
          op: "=="
          value: "producer"
    evidenceRequired:
      - "claims.battery.producer_registration_changes_notified"

  - id: "battery.art55.13"
    articleRef: "Article 55"
    paragraphRef: "Art 55(13)"
    title: "Online platform access to producer register information"
    obligationType: "register_access"
    encodable: true
    entityLevel: false
    notApplicableReason: "Article 55(13) imposes an access obligation on Member States where the register is not public."

  - id: "battery.art56.1"
    articleRef: "Article 56"
    paragraphRef: "Art 56(1)"
    title: "Producer fulfils extended producer responsibility"
    obligationType: "extended_producer_responsibility"
    encodable: true
    checkType: "boolean"
    applicability:
      all:
        - field: "claims.battery.operator_role"
          op: "=="
          value: "producer"
    evidenceRequired:
      - "claims.battery.extended_producer_responsibility_fulfilled"

  - id: "battery.art56.2"
    articleRef: "Article 56"
    paragraphRef: "Art 56(2)"
    title: "Operator placing repurposed or remanufactured battery on the market fulfils producer responsibility"
    obligationType: "extended_producer_responsibility"
    encodable: true
    checkType: "boolean"
    applicability:
      all:
        - field: "claims.battery.operator_role"
          op: "=="
          value: "producer"
        - field: "claims.battery.status"
          op: "in"
          value: ["repurposed", "remanufactured", "prepared_for_reuse", "prepared_for_repurposing"]
    evidenceRequired:
      - "claims.battery.extended_producer_responsibility_fulfilled"

  - id: "battery.art56.3"
    articleRef: "Article 56"
    paragraphRef: "Art 56(3)"
    title: "Distance seller appoints an authorised representative for extended producer responsibility"
    obligationType: "authorised_representative"
    encodable: true
    checkType: "boolean"
    applicability:
      all:
        - field: "claims.battery.operator_role"
          op: "=="
          value: "producer"
        - field: "claims.battery.distance_seller_into_member_state"
          op: "=="
          value: true
    evidenceRequired:
      - "claims.battery.authorised_representative_for_epr_appointed"

  - id: "battery.art56.4.a"
    articleRef: "Article 56"
    paragraphRef: "Art 56(4)(a)"
    title: "Financial contributions cover collection, transport, and treatment costs"
    obligationType: "financial_contribution"
    encodable: true
    checkType: "boolean"
    applicability:
      all:
        - field: "claims.battery.operator_role"
          op: "=="
          value: "producer"
    evidenceRequired:
      - "claims.battery.financial_contributions_cover_collection_treatment_costs"

  - id: "battery.art56.4.b"
    articleRef: "Article 56"
    paragraphRef: "Art 56(4)(b)"
    title: "Financial contributions cover compositional survey costs"
    obligationType: "financial_contribution"
    encodable: true
    checkType: "boolean"
    applicability:
      all:
        - any:
            - field: "claims.battery.category"
              op: "=="
              value: "portable"
            - field: "claims.battery.category"
              op: "=="
              value: "lmt"
        - field: "claims.battery.operator_role"
          op: "=="
          value: "producer"
    evidenceRequired:
      - "claims.battery.financial_contributions_cover_compositional_survey_costs"

  - id: "battery.art56.4.c"
    articleRef: "Article 56"
    paragraphRef: "Art 56(4)(c)"
    title: "Financial contributions cover waste-battery information costs"
    obligationType: "financial_contribution"
    encodable: true
    checkType: "boolean"
    applicability:
      all:
        - field: "claims.battery.operator_role"
          op: "=="
          value: "producer"
    evidenceRequired:
      - "claims.battery.financial_contributions_cover_information_costs"

  - id: "battery.art56.4.d"
    articleRef: "Article 56"
    paragraphRef: "Art 56(4)(d)"
    title: "Financial contributions cover reporting costs"
    obligationType: "financial_contribution"
    encodable: true
    checkType: "boolean"
    applicability:
      all:
        - field: "claims.battery.operator_role"
          op: "=="
          value: "producer"
    evidenceRequired:
      - "claims.battery.financial_contributions_cover_reporting_costs"

  - id: "battery.art56.5"
    articleRef: "Article 56"
    paragraphRef: "Art 56(5)"
    title: "Repurposed or remanufactured battery cost-sharing mechanism is documented where used"
    obligationType: "cost_sharing"
    encodable: true
    checkType: "boolean"
    applicability:
      all:
        - field: "claims.battery.operator_role"
          op: "=="
          value: "producer"
        - field: "claims.battery.status"
          op: "in"
          value: ["repurposed", "remanufactured"]
        - field: "claims.battery.cost_sharing_mechanism_used"
          op: "=="
          value: true
    evidenceRequired:
      - "claims.battery.cost_sharing_mechanism_documented"

  - id: "battery.art57.1"
    articleRef: "Article 57"
    paragraphRef: "Art 57(1)"
    title: "Appointed producer responsibility organisation is authorised"
    obligationType: "producer_responsibility_organisation"
    encodable: true
    checkType: "boolean"
    applicability:
      all:
        - field: "claims.battery.operator_role"
          op: "=="
          value: "producer"
        - field: "claims.battery.collective_epr_fulfilment"
          op: "=="
          value: true
    evidenceRequired:
      - "claims.battery.producer_responsibility_organisation_authorized"

  - id: "battery.art57.2.a"
    articleRef: "Article 57"
    paragraphRef: "Art 57(2)(a)"
    title: "PRO financial contributions are modulated by category and chemistry"
    obligationType: "producer_responsibility_organisation"
    encodable: true
    checkType: "boolean"
    applicability:
      all:
        - field: "claims.battery.operator_role"
          op: "=="
          value: "producer_responsibility_organisation"
    evidenceRequired:
      - "claims.battery.pro_financial_contributions_modulated"

  - id: "battery.art57.2.b"
    articleRef: "Article 57"
    paragraphRef: "Art 57(2)(b)"
    title: "PRO financial contributions are adjusted for re-use, repurposing, and secondary raw material revenues"
    obligationType: "producer_responsibility_organisation"
    encodable: true
    checkType: "boolean"
    applicability:
      all:
        - field: "claims.battery.operator_role"
          op: "=="
          value: "producer_responsibility_organisation"
    evidenceRequired:
      - "claims.battery.pro_financial_contributions_revenue_adjusted"

  - id: "battery.art57.3"
    articleRef: "Article 57"
    paragraphRef: "Art 57(3)"
    title: "PRO ensures coordinated territorial coverage across the Member State"
    obligationType: "producer_responsibility_organisation"
    encodable: true
    checkType: "boolean"
    applicability:
      all:
        - field: "claims.battery.operator_role"
          op: "=="
          value: "producer_responsibility_organisation"
    evidenceRequired:
      - "claims.battery.pro_territorial_coverage_complete"

  - id: "battery.art57.4"
    articleRef: "Article 57"
    paragraphRef: "Art 57(4)"
    title: "PRO preserves confidentiality of proprietary producer data"
    obligationType: "confidentiality"
    encodable: true
    checkType: "boolean"
    applicability:
      all:
        - field: "claims.battery.operator_role"
          op: "=="
          value: "producer_responsibility_organisation"
    evidenceRequired:
      - "claims.battery.pro_confidentiality_controls_exist"

  - id: "battery.art57.5"
    articleRef: "Article 57"
    paragraphRef: "Art 57(5)"
    title: "PRO publishes collection, recycling-efficiency, and recovery results annually"
    obligationType: "public_reporting"
    encodable: true
    checkType: "boolean"
    applicability:
      all:
        - field: "claims.battery.operator_role"
          op: "=="
          value: "producer_responsibility_organisation"
    evidenceRequired:
      - "claims.battery.pro_collection_rate_published"
      - "claims.battery.pro_recycling_efficiency_published"
      - "claims.battery.pro_material_recovery_published"

  - id: "battery.art57.6"
    articleRef: "Article 57"
    paragraphRef: "Art 57(6)"
    title: "PRO publishes information on waste-operator selection procedure"
    obligationType: "public_reporting"
    encodable: true
    checkType: "boolean"
    applicability:
      all:
        - field: "claims.battery.operator_role"
          op: "=="
          value: "producer_responsibility_organisation"
    evidenceRequired:
      - "claims.battery.pro_operator_selection_public"

  - id: "battery.art57.8"
    articleRef: "Article 57"
    paragraphRef: "Art 57(8)"
    title: "Waste-management operator selection is non-discriminatory and transparent"
    obligationType: "operator_selection"
    encodable: true
    checkType: "boolean"
    applicability:
      any:
        - field: "claims.battery.operator_role"
          op: "=="
          value: "producer"
        - field: "claims.battery.operator_role"
          op: "=="
          value: "producer_responsibility_organisation"
    evidenceRequired:
      - "claims.battery.waste_management_operator_selection_nondiscriminatory"

  - id: "battery.art58.1"
    articleRef: "Article 58"
    paragraphRef: "Art 58(1)"
    title: "Required EPR authorisation has been obtained"
    obligationType: "authorisation"
    encodable: true
    checkType: "boolean"
    applicability:
      any:
        - all:
            - field: "claims.battery.operator_role"
              op: "=="
              value: "producer"
            - field: "claims.battery.epr_fulfilment_mode"
              op: "=="
              value: "individual"
        - field: "claims.battery.operator_role"
          op: "=="
          value: "producer_responsibility_organisation"
    evidenceRequired:
      - "claims.battery.epr_authorisation_exists"

  - id: "battery.art58.2.a"
    articleRef: "Article 58"
    paragraphRef: "Art 58(2)(a)"
    title: "EPR measures are sufficient to fulfil Chapter VIII obligations"
    obligationType: "authorisation_evidence"
    encodable: true
    checkType: "boolean"
    applicability:
      any:
        - all:
            - field: "claims.battery.operator_role"
              op: "=="
              value: "producer"
            - field: "claims.battery.epr_fulfilment_mode"
              op: "=="
              value: "individual"
        - field: "claims.battery.operator_role"
          op: "=="
          value: "producer_responsibility_organisation"
    evidenceRequired:
      - "claims.battery.epr_measures_sufficient"

  - id: "battery.art58.2.b"
    articleRef: "Article 58"
    paragraphRef: "Art 58(2)(b)"
    title: "Portable and LMT collection arrangements are documented to meet collection targets"
    obligationType: "authorisation_evidence"
    encodable: true
    checkType: "boolean"
    applicability:
      all:
        - any:
            - field: "claims.battery.operator_role"
              op: "=="
              value: "producer"
            - field: "claims.battery.operator_role"
              op: "=="
              value: "producer_responsibility_organisation"
        - any:
            - field: "claims.battery.category"
              op: "=="
              value: "portable"
            - field: "claims.battery.category"
              op: "=="
              value: "lmt"
    evidenceRequired:
      - "claims.battery.collection_arrangements_documented"
      - "claims.battery.collection_target_attainment_plan_exists"

  - id: "battery.art58.3"
    articleRef: "Article 58"
    paragraphRef: "Art 58(3)"
    title: "Independent verification report supports EPR authorisation dossier where used"
    obligationType: "verification"
    encodable: true
    checkType: "boolean"
    applicability:
      all:
        - any:
            - field: "claims.battery.operator_role"
              op: "=="
              value: "producer"
            - field: "claims.battery.operator_role"
              op: "=="
              value: "producer_responsibility_organisation"
        - field: "claims.battery.independent_verification_used"
          op: "=="
          value: true
    evidenceRequired:
      - "claims.battery.independent_verification_report_exists"

  - id: "battery.art58.4"
    articleRef: "Article 58"
    paragraphRef: "Art 58(4)"
    title: "Changes to authorisation terms are notified without undue delay"
    obligationType: "authorisation_update"
    encodable: true
    checkType: "boolean"
    applicability:
      any:
        - field: "claims.battery.operator_role"
          op: "=="
          value: "producer"
        - field: "claims.battery.operator_role"
          op: "=="
          value: "producer_responsibility_organisation"
    evidenceRequired:
      - "claims.battery.authorisation_changes_notified"

  - id: "battery.art58.5"
    articleRef: "Article 58"
    paragraphRef: "Art 58(5)"
    title: "Self-control reporting and corrective planning are maintained"
    obligationType: "self_control"
    encodable: true
    checkType: "boolean"
    applicability:
      any:
        - field: "claims.battery.operator_role"
          op: "=="
          value: "producer"
        - field: "claims.battery.operator_role"
          op: "=="
          value: "producer_responsibility_organisation"
    evidenceRequired:
      - "claims.battery.self_control_report_exists"
      - "claims.battery.corrective_action_plan_exists"

  - id: "battery.art58.6"
    articleRef: "Article 58"
    paragraphRef: "Art 58(6)"
    title: "Revocation of authorisation is a competent-authority enforcement power"
    obligationType: "enforcement"
    encodable: true
    entityLevel: false
    notApplicableReason: "Article 58(6) describes revocation powers of competent authorities."

  - id: "battery.art58.7"
    articleRef: "Article 58"
    paragraphRef: "Art 58(7)"
    title: "Guarantee exists to cover waste-management costs in case of non-compliance or insolvency"
    obligationType: "financial_guarantee"
    encodable: true
    checkType: "boolean"
    applicability:
      any:
        - all:
            - field: "claims.battery.operator_role"
              op: "=="
              value: "producer"
            - field: "claims.battery.epr_fulfilment_mode"
              op: "=="
              value: "individual"
        - field: "claims.battery.operator_role"
          op: "=="
          value: "producer_responsibility_organisation"
    evidenceRequired:
      - "claims.battery.epr_guarantee_exists"

  - id: "battery.art59.1"
    articleRef: "Article 59"
    paragraphRef: "Art 59(1)"
    title: "Producer or PRO operates a free take-back and collection system for portable batteries"
    obligationType: "collection_system"
    encodable: true
    checkType: "boolean"
    applicability:
      all:
        - field: "claims.battery.category"
          op: "=="
          value: "portable"
        - any:
            - field: "claims.battery.operator_role"
              op: "=="
              value: "producer"
            - field: "claims.battery.operator_role"
              op: "=="
              value: "producer_responsibility_organisation"
    evidenceRequired:
      - "claims.battery.portable_takeback_system_exists"
      - "claims.battery.portable_collection_offer_free"
      - "claims.battery.portable_collection_containers_provided"
      - "claims.battery.portable_collection_frequency_proportionate"
      - "claims.battery.portable_weee_collection_supported"
      - "claims.battery.portable_collected_waste_sent_to_treatment"

  - id: "battery.art59.2"
    articleRef: "Article 59"
    paragraphRef: "Art 59(2)"
    title: "Portable collection network covers the whole territory of the Member State"
    obligationType: "collection_system"
    encodable: true
    checkType: "boolean"
    applicability:
      all:
        - field: "claims.battery.category"
          op: "=="
          value: "portable"
        - any:
            - field: "claims.battery.operator_role"
              op: "=="
              value: "producer"
            - field: "claims.battery.operator_role"
              op: "=="
              value: "producer_responsibility_organisation"
    evidenceRequired:
      - "claims.battery.portable_collection_network_territorially_complete"

  - id: "battery.art59.3.2023"
    articleRef: "Article 59"
    paragraphRef: "Art 59(3)(a)"
    title: "Portable collection rate is at least 45 percent"
    obligationType: "collection_target"
    encodable: true
    checkType: "threshold"
    applicability:
      all:
        - field: "claims.battery.category"
          op: "=="
          value: "portable"
        - any:
            - field: "claims.battery.operator_role"
              op: "=="
              value: "producer"
            - field: "claims.battery.operator_role"
              op: "=="
              value: "producer_responsibility_organisation"
        - field: "input.assessmentDate"
          op: "date_on_or_after"
          value: "2024-01-01"
    conditions:
      all:
        - metric: "ratio"
          numeratorField: "claims.battery.portable_collection_rate_numerator_kg"
          denominatorField: "claims.battery.portable_collection_rate_denominator_kg"
          multiplier: 100
          op: ">="
          value: 45
    evidenceRequired:
      - "claims.battery.portable_collection_rate_numerator_kg"
      - "claims.battery.portable_collection_rate_denominator_kg"

  - id: "battery.art59.3.2027"
    articleRef: "Article 59"
    paragraphRef: "Art 59(3)(b)"
    title: "Portable collection rate is at least 63 percent"
    obligationType: "collection_target"
    encodable: true
    checkType: "threshold"
    applicability:
      all:
        - field: "claims.battery.category"
          op: "=="
          value: "portable"
        - any:
            - field: "claims.battery.operator_role"
              op: "=="
              value: "producer"
            - field: "claims.battery.operator_role"
              op: "=="
              value: "producer_responsibility_organisation"
        - field: "input.assessmentDate"
          op: "date_on_or_after"
          value: "2028-01-01"
    conditions:
      all:
        - metric: "ratio"
          numeratorField: "claims.battery.portable_collection_rate_numerator_kg"
          denominatorField: "claims.battery.portable_collection_rate_denominator_kg"
          multiplier: 100
          op: ">="
          value: 63
    evidenceRequired:
      - "claims.battery.portable_collection_rate_numerator_kg"
      - "claims.battery.portable_collection_rate_denominator_kg"

  - id: "battery.art59.3.2030"
    articleRef: "Article 59"
    paragraphRef: "Art 59(3)(c)"
    title: "Portable collection rate is at least 73 percent"
    obligationType: "collection_target"
    encodable: true
    checkType: "threshold"
    applicability:
      all:
        - field: "claims.battery.category"
          op: "=="
          value: "portable"
        - any:
            - field: "claims.battery.operator_role"
              op: "=="
              value: "producer"
            - field: "claims.battery.operator_role"
              op: "=="
              value: "producer_responsibility_organisation"
        - field: "input.assessmentDate"
          op: "date_on_or_after"
          value: "2031-01-01"
    conditions:
      all:
        - metric: "ratio"
          numeratorField: "claims.battery.portable_collection_rate_numerator_kg"
          denominatorField: "claims.battery.portable_collection_rate_denominator_kg"
          multiplier: 100
          op: ">="
          value: 73
    evidenceRequired:
      - "claims.battery.portable_collection_rate_numerator_kg"
      - "claims.battery.portable_collection_rate_denominator_kg"

  - id: "battery.art60.1"
    articleRef: "Article 60"
    paragraphRef: "Art 60(1)"
    title: "Producer or PRO operates a free take-back and collection system for LMT batteries"
    obligationType: "collection_system"
    encodable: true
    checkType: "boolean"
    applicability:
      all:
        - field: "claims.battery.category"
          op: "=="
          value: "lmt"
        - any:
            - field: "claims.battery.operator_role"
              op: "=="
              value: "producer"
            - field: "claims.battery.operator_role"
              op: "=="
              value: "producer_responsibility_organisation"
    evidenceRequired:
      - "claims.battery.lmt_takeback_system_exists"
      - "claims.battery.lmt_collection_offer_free"
      - "claims.battery.lmt_collection_containers_provided"
      - "claims.battery.lmt_collection_frequency_proportionate"
      - "claims.battery.lmt_weee_collection_supported"
      - "claims.battery.lmt_collected_waste_sent_to_treatment"

  - id: "battery.art60.2"
    articleRef: "Article 60"
    paragraphRef: "Art 60(2)"
    title: "LMT collection network covers the whole territory of the Member State"
    obligationType: "collection_system"
    encodable: true
    checkType: "boolean"
    applicability:
      all:
        - field: "claims.battery.category"
          op: "=="
          value: "lmt"
        - any:
            - field: "claims.battery.operator_role"
              op: "=="
              value: "producer"
            - field: "claims.battery.operator_role"
              op: "=="
