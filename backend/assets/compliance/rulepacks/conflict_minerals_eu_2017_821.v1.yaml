schemaVersion: "1.1"
regulation:
  id: "eu.regulation.2017.821"
  shortName: "Conflict Minerals Regulation"
  citation: "Regulation (EU) 2017/821"
  sourcePdf: "thesis/sources/European Parliament and Council, Regulation (EU) 2017:821 laying down supply chain due diligence obligations for importers of tin, tantalum, tungsten and gold, Official Journal of the European Union, 2017.pdf"
  notes:
    - "Draft rulepack for importer-focused due diligence obligations."
    - "Annex I CN-code tables and thresholds still need structured extraction for full deterministic scope calculations."

rulepack:
  id: "conflict_minerals_eu_2017_821_v1"
  version: "0.2.0"
  status: "draft"

chapters:
  - id: "conflict_minerals.scope_definitions"
    title: "Scope and Definitions"
    articleStart: 1
    articleEnd: 3
  - id: "conflict_minerals.due_diligence_obligations"
    title: "Due Diligence Obligations"
    articleStart: 4
    articleEnd: 7
  - id: "conflict_minerals.supervision_support"
    title: "Supervision and Support Measures"
    articleStart: 8
    articleEnd: 17
  - id: "conflict_minerals.final_provisions"
    title: "Final Provisions"
    articleStart: 18
    articleEnd: 20

rules:
  # Article 1 — Subject matter and scope
  - id: "conflict_minerals.art1.2"
    articleRef: "Article 1"
    paragraphRef: "Art 1(2)"
    title: "Importer falls within the scope of Annex I minerals or metals"
    obligationType: "scope_gate"
    encodable: true
    checkType: "presence"
    evidenceRequired:
      - "claims.conflict_minerals.union_importer"
      - "claims.conflict_minerals.material_type"
      - "claims.conflict_minerals.cn_code"

  - id: "conflict_minerals.art1.3"
    articleRef: "Article 1"
    paragraphRef: "Art 1(3)"
    title: "Annual import volume exceeds the Annex I threshold"
    obligationType: "scope_gate"
    encodable: true
    checkType: "boolean"
    evidenceRequired:
      - "claims.conflict_minerals.annex_i_threshold_exceeded"

  - id: "conflict_minerals.art1.6"
    articleRef: "Article 1"
    paragraphRef: "Art 1(6)"
    title: "Recycled metals are excluded except for Article 7(4)"
    obligationType: "scope_exclusion"
    encodable: true
    checkType: "boolean"
    applicability:
      all:
        - field: "claims.conflict_minerals.recycled_metals"
          op: "=="
          value: true
    evidenceRequired:
      - "claims.conflict_minerals.recycled_metals"

  - id: "conflict_minerals.art1.7"
    articleRef: "Article 1"
    paragraphRef: "Art 1(7)"
    title: "Verified pre-1 February 2013 stocks are excluded"
    obligationType: "scope_exclusion"
    encodable: true
    checkType: "boolean"
    applicability:
      all:
        - field: "claims.conflict_minerals.pre_2013_stock_verified"
          op: "=="
          value: true
    evidenceRequired:
      - "claims.conflict_minerals.pre_2013_stock_verified"

  - id: "conflict_minerals.art1.8"
    articleRef: "Article 1"
    paragraphRef: "Art 1(8)"
    title: "Covered by-products remain within the Regulation"
    obligationType: "scope_gate"
    encodable: true
    checkType: "presence"
    applicability:
      all:
        - field: "claims.conflict_minerals.by_product"
          op: "=="
          value: true
    evidenceRequired:
      - "claims.conflict_minerals.by_product_origin_documented"

  # Article 2 — Definitions
  - id: "conflict_minerals.art2"
    articleRef: "Article 2"
    paragraphRef: "Art 2"
    title: "Definitions"
    obligationType: "definition"
    entityLevel: false
    notApplicableReason: "Article 2 provides interpretive definitions rather than direct importer duties."
    encodable: false
    encodabilityReason: "definition provision"
    checkType: "presence"
    evidenceRequired: []

  # Article 3 — Compliance of Union importers with due diligence obligations
  - id: "conflict_minerals.art3.1"
    articleRef: "Article 3"
    paragraphRef: "Art 3(1)"
    title: "Importer keeps documentation demonstrating compliance, including audit results"
    obligationType: "bridge_obligation"
    encodable: true
    checkType: "presence"
    evidenceRequired:
      - "claims.conflict_minerals.compliance_documentation_exists"

  - id: "conflict_minerals.art3.3"
    articleRef: "Article 3"
    paragraphRef: "Art 3(3)"
    title: "Use of recognised supply chain due diligence schemes"
    obligationType: "bridge_obligation"
    encodable: true
    checkType: "presence"
    evidenceRequired:
      - "claims.conflict_minerals.recognised_scheme_used"

  # Article 4 — Management system obligations
  - id: "conflict_minerals.art4.a"
    articleRef: "Article 4"
    paragraphRef: "Art 4(a)"
    title: "Supply chain policy is adopted and communicated to suppliers and the public"
    obligationType: "management_system"
    encodable: true
    checkType: "presence"
    evidenceRequired:
      - "claims.conflict_minerals.supply_chain_policy_exists"

  - id: "conflict_minerals.art4.b"
    articleRef: "Article 4"
    paragraphRef: "Art 4(b)"
    title: "Supply chain policy is aligned with Annex II to the OECD Due Diligence Guidance"
    obligationType: "management_system"
    encodable: true
    checkType: "presence"
    evidenceRequired:
      - "claims.conflict_minerals.oecd_annex_ii_alignment"

  - id: "conflict_minerals.art4.c"
    articleRef: "Article 4"
    paragraphRef: "Art 4(c)"
    title: "Internal management system assigns senior management responsibility and preserves records for at least five years"
    obligationType: "management_system"
    encodable: true
    checkType: "threshold"
    conditions:
      all:
        - field: "claims.conflict_minerals.senior_management_responsibility_assigned"
          op: "=="
          value: true
        - field: "claims.conflict_minerals.record_retention_years"
          op: ">="
          value: 5
    evidenceRequired:
      - "claims.conflict_minerals.senior_management_responsibility_assigned"
      - "claims.conflict_minerals.record_retention_years"

  - id: "conflict_minerals.art4.d"
    articleRef: "Article 4"
    paragraphRef: "Art 4(d)"
    title: "Supplier contracts incorporate the supply chain policy"
    obligationType: "management_system"
    encodable: true
    checkType: "presence"
    evidenceRequired:
      - "claims.conflict_minerals.supplier_contract_policy_flowdown"

  - id: "conflict_minerals.art4.e"
    articleRef: "Article 4"
    paragraphRef: "Art 4(e)"
    title: "Grievance mechanism exists or is made available through collaborative arrangements or external recourse"
    obligationType: "management_system"
    encodable: true
    checkType: "presence"
    evidenceRequired:
      - "claims.conflict_minerals.grievance_mechanism_exists"

  - id: "conflict_minerals.art4.f"
    articleRef: "Article 4"
    paragraphRef: "Art 4(f)"
    title: "Mineral traceability system documents supplier, origin, and upstream origin information"
    obligationType: "traceability"
    encodable: true
    checkType: "presence"
    applicability:
      all:
        - field: "claims.conflict_minerals.material_form"
          op: "=="
          value: "mineral"
    evidenceRequired:
      - "claims.conflict_minerals.traceability_system_exists"
      - "claims.conflict_minerals.chain_of_custody_records"
      - "claims.conflict_minerals.origin_country"

  - id: "conflict_minerals.art4.g"
    articleRef: "Article 4"
    paragraphRef: "Art 4(g)"
    title: "Metal traceability system identifies suppliers, smelters and refiners, and supporting audit evidence"
    obligationType: "traceability"
    encodable: true
    checkType: "presence"
    applicability:
      all:
        - field: "claims.conflict_minerals.material_form"
          op: "=="
          value: "metal"
    evidenceRequired:
      - "claims.conflict_minerals.traceability_system_exists"
      - "claims.conflict_minerals.smelter_refiner_identified"
      - "claims.conflict_minerals.third_party_audit_exists"

  - id: "conflict_minerals.art4.h"
    articleRef: "Article 4"
    paragraphRef: "Art 4(h)"
    title: "By-product origin is documented from the point of first separation"
    obligationType: "traceability"
    encodable: true
    checkType: "presence"
    applicability:
      all:
        - field: "claims.conflict_minerals.by_product"
          op: "=="
          value: true
    evidenceRequired:
      - "claims.conflict_minerals.by_product_origin_documented"

  # Article 5 — Risk management obligations
  - id: "conflict_minerals.art5.1.a"
    articleRef: "Article 5"
    paragraphRef: "Art 5(1)(a)"
    title: "Mineral importer identifies and assesses risks against policy standards and OECD Guidance"
    obligationType: "risk_management"
    encodable: true
    checkType: "presence"
    applicability:
      all:
        - field: "claims.conflict_minerals.material_form"
          op: "=="
          value: "mineral"
    evidenceRequired:
      - "claims.conflict_minerals.risk_assessment_exists"

  - id: "conflict_minerals.art5.1.b.i"
    articleRef: "Article 5"
    paragraphRef: "Art 5(1)(b)(i)"
    title: "Risk findings are reported to senior management"
    obligationType: "risk_management"
    encodable: true
    checkType: "presence"
    applicability:
      all:
        - field: "claims.conflict_minerals.material_form"
          op: "=="
          value: "mineral"
    evidenceRequired:
      - "claims.conflict_minerals.risk_assessment_reported_to_senior_management"

  - id: "conflict_minerals.art5.1.b.ii"
    articleRef: "Article 5"
    paragraphRef: "Art 5(1)(b)(ii)"
    title: "Risk response strategy supports mitigation, temporary suspension, or disengagement"
    obligationType: "risk_management"
    encodable: true
    checkType: "presence"
    applicability:
      all:
        - field: "claims.conflict_minerals.material_form"
          op: "=="
          value: "mineral"
    evidenceRequired:
      - "claims.conflict_minerals.risk_response_strategy_defined"

  - id: "conflict_minerals.art5.1.b.iii"
    articleRef: "Article 5"
    paragraphRef: "Art 5(1)(b)(iii)"
    title: "Risk management plan is implemented and mitigation performance is tracked"
    obligationType: "risk_management"
    encodable: true
    checkType: "presence"
    applicability:
      all:
        - field: "claims.conflict_minerals.material_form"
          op: "=="
          value: "mineral"
    evidenceRequired:
      - "claims.conflict_minerals.risk_management_plan_exists"
      - "claims.conflict_minerals.risk_mitigation_tracking"

  - id: "conflict_minerals.art5.1.b.iv"
    articleRef: "Article 5"
    paragraphRef: "Art 5(1)(b)(iv)"
    title: "Additional fact and risk assessments are undertaken when mitigation is needed or circumstances change"
    obligationType: "risk_management"
    encodable: true
    checkType: "presence"
    applicability:
      all:
        - field: "claims.conflict_minerals.material_form"
          op: "=="
          value: "mineral"
    evidenceRequired:
      - "claims.conflict_minerals.additional_risk_assessments"

  - id: "conflict_minerals.art5.2"
    articleRef: "Article 5"
    paragraphRef: "Art 5(2)"
    title: "Stakeholders and suppliers are consulted when mitigation is pursued while trade continues or is temporarily suspended"
    obligationType: "risk_management"
    encodable: true
    checkType: "presence"
    applicability:
      all:
        - field: "claims.conflict_minerals.material_form"
          op: "=="
          value: "mineral"
    evidenceRequired:
      - "claims.conflict_minerals.stakeholder_consultation_for_mitigation"

  - id: "conflict_minerals.art5.3"
    articleRef: "Article 5"
    paragraphRef: "Art 5(3)"
    title: "Mitigation strategy relies on Annex III OECD measures and indicators"
    obligationType: "risk_management"
    encodable: true
    checkType: "presence"
    applicability:
      all:
        - field: "claims.conflict_minerals.material_form"
          op: "=="
          value: "mineral"
    evidenceRequired:
      - "claims.conflict_minerals.oecd_annex_iii_measures_used"

  - id: "conflict_minerals.art5.4"
    articleRef: "Article 5"
    paragraphRef: "Art 5(4)"
    title: "Metal importer identifies and assesses risks using smelter/refiner audits or its own audit process"
    obligationType: "risk_management"
    encodable: true
    checkType: "presence"
    applicability:
      all:
        - field: "claims.conflict_minerals.material_form"
          op: "=="
          value: "metal"
    evidenceRequired:
      - "claims.conflict_minerals.risk_assessment_exists"

  - id: "conflict_minerals.art5.5"
    articleRef: "Article 5"
    paragraphRef: "Art 5(5)"
    title: "Metal importer reports findings to senior management and implements a response strategy"
    obligationType: "risk_management"
    encodable: true
    checkType: "presence"
    applicability:
      all:
        - field: "claims.conflict_minerals.material_form"
          op: "=="
          value: "metal"
    evidenceRequired:
      - "claims.conflict_minerals.risk_assessment_reported_to_senior_management"
      - "claims.conflict_minerals.risk_response_strategy_defined"

  # Article 6 — Third-party audit obligations
  - id: "conflict_minerals.art6.1"
    articleRef: "Article 6"
    paragraphRef: "Art 6(1)"
    title: "Independent third-party audit is carried out"
    obligationType: "third_party_audit"
    encodable: true
    checkType: "boolean"
    evidenceRequired:
      - "claims.conflict_minerals.third_party_audit_exists"

  - id: "conflict_minerals.art6.1.a"
    articleRef: "Article 6"
    paragraphRef: "Art 6(1)(a)"
    title: "Audit scope covers activities, processes and systems used for Articles 4, 5 and 7"
    obligationType: "third_party_audit"
    encodable: true
    checkType: "boolean"
    evidenceRequired:
      - "claims.conflict_minerals.audit_scope_complete"

  - id: "conflict_minerals.art6.1.b"
    articleRef: "Article 6"
    paragraphRef: "Art 6(1)(b)"
    title: "Audit objective is conformity with Articles 4, 5 and 7"
    obligationType: "third_party_audit"
    encodable: true
    checkType: "boolean"
    evidenceRequired:
      - "claims.conflict_minerals.audit_conformity_objective"

  - id: "conflict_minerals.art6.1.c"
    articleRef: "Article 6"
    paragraphRef: "Art 6(1)(c)"
    title: "Audit provides recommendations for improvement"
    obligationType: "third_party_audit"
    encodable: true
    checkType: "boolean"
    evidenceRequired:
      - "claims.conflict_minerals.audit_recommendations_provided"

  - id: "conflict_minerals.art6.1.d"
    articleRef: "Article 6"
    paragraphRef: "Art 6(1)(d)"
    title: "Audit respects independence, competence and accountability principles"
    obligationType: "third_party_audit"
    encodable: true
    checkType: "boolean"
    evidenceRequired:
      - "claims.conflict_minerals.audit_independence_confirmed"

  - id: "conflict_minerals.art6.2"
    articleRef: "Article 6"
    paragraphRef: "Art 6(2)"
    title: "Metal importer audit exemption is supported by substantive evidence for all smelters and refiners"
    obligationType: "third_party_audit"
    encodable: true
    checkType: "boolean"
    applicability:
      all:
        - field: "claims.conflict_minerals.material_form"
          op: "=="
          value: "metal"
    evidenceRequired:
      - "claims.conflict_minerals.substantive_evidence_of_smelter_refiner_compliance"

  # Article 7 — Disclosure obligations
  - id: "conflict_minerals.art7.1"
    articleRef: "Article 7"
    paragraphRef: "Art 7(1)"
    title: "Audit reports or recognised-scheme conformity evidence are made available to competent authorities"
    obligationType: "disclosure"
    encodable: true
    checkType: "presence"
    evidenceRequired:
      - "claims.conflict_minerals.audit_reports_shared_with_authorities"

  - id: "conflict_minerals.art7.2"
    articleRef: "Article 7"
    paragraphRef: "Art 7(2)"
    title: "Immediate downstream purchasers receive due diligence information"
    obligationType: "disclosure"
    encodable: true
    checkType: "presence"
    evidenceRequired:
      - "claims.conflict_minerals.information_shared_with_downstream_purchasers"

  - id: "conflict_minerals.art7.3"
    articleRef: "Article 7"
    paragraphRef: "Art 7(3)"
    title: "Annual public report describes management system, risk management and audit summary"
    obligationType: "disclosure"
    encodable: true
    checkType: "presence"
    evidenceRequired:
      - "claims.conflict_minerals.public_disclosure_exists"

  - id: "conflict_minerals.art7.4"
    articleRef: "Article 7"
    paragraphRef: "Art 7(4)"
    title: "Recycled or scrap-source conclusion and due diligence measures are publicly disclosed"
    obligationType: "disclosure"
    encodable: true
    checkType: "presence"
    applicability:
      all:
        - field: "claims.conflict_minerals.recycled_metals"
          op: "=="
          value: true
    evidenceRequired:
      - "claims.conflict_minerals.recycled_source_conclusion_disclosed"

  # Articles 8-20 — supervision, review, delegation, and final provisions
  - id: "conflict_minerals.art8"
    articleRef: "Article 8"
    paragraphRef: "Art 8"
    title: "Recognition of supply chain due diligence schemes"
    obligationType: "scheme_recognition"
    entityLevel: false
    notApplicableReason: "Article 8 governs Commission recognition of schemes rather than a direct importer obligation."
    encodable: false
    encodabilityReason: "scheme-recognition architecture provision"
    checkType: "presence"
    evidenceRequired: []

  - id: "conflict_minerals.art9"
    articleRef: "Article 9"
    paragraphRef: "Art 9"
    title: "List of global responsible smelters and refiners"
    obligationType: "scheme_recognition"
    entityLevel: false
    notApplicableReason: "Article 9 regulates the Commission list of global responsible smelters and refiners."
    encodable: false
    encodabilityReason: "Commission listing provision"
    checkType: "presence"
    evidenceRequired: []

  - id: "conflict_minerals.art10"
    articleRef: "Article 10"
    paragraphRef: "Art 10"
    title: "Member State competent authorities"
    obligationType: "competent_authorities"
    entityLevel: false
    notApplicableReason: "Article 10 concerns designation and responsibilities of competent authorities."
    encodable: false
    encodabilityReason: "institutional supervision provision"
    checkType: "presence"
    evidenceRequired: []

  - id: "conflict_minerals.art11"
    articleRef: "Article 11"
    paragraphRef: "Art 11"
    title: "Ex-post checks on Union importers"
    obligationType: "supervision"
    entityLevel: false
    notApplicableReason: "Article 11 primarily governs competent-authority ex-post checks; importer assistance duties are enforcement-facing."
    encodable: false
    encodabilityReason: "supervisory investigation provision"
    checkType: "presence"
    evidenceRequired: []

  - id: "conflict_minerals.art12"
    articleRef: "Article 12"
    paragraphRef: "Art 12"
    title: "Records of ex-post checks"
    obligationType: "supervision"
    entityLevel: false
    notApplicableReason: "Article 12 addresses authority recordkeeping."
    encodable: false
    encodabilityReason: "authority recordkeeping provision"
    checkType: "presence"
    evidenceRequired: []

  - id: "conflict_minerals.art13"
    articleRef: "Article 13"
    paragraphRef: "Art 13"
    title: "Cooperation and information exchange"
    obligationType: "supervision"
    entityLevel: false
    notApplicableReason: "Article 13 regulates inter-authority cooperation."
    encodable: false
    encodabilityReason: "institutional cooperation provision"
    checkType: "presence"
    evidenceRequired: []

  - id: "conflict_minerals.art14"
    articleRef: "Article 14"
    paragraphRef: "Art 14"
    title: "Commission guidelines and indicative high-risk area list"
    obligationType: "guidance"
    entityLevel: false
    notApplicableReason: "Article 14 concerns Commission guidance and indicative area lists rather than direct importer duties."
    encodable: false
    encodabilityReason: "guidance provision"
    checkType: "presence"
    evidenceRequired: []

  - id: "conflict_minerals.art15"
    articleRef: "Article 15"
    paragraphRef: "Art 15"
    title: "Committee procedure"
    obligationType: "committee_procedure"
    entityLevel: false
    notApplicableReason: "Article 15 is an institutional committee procedure clause."
    encodable: false
    encodabilityReason: "institutional procedure provision"
    checkType: "presence"
    evidenceRequired: []

  - id: "conflict_minerals.art16"
    articleRef: "Article 16"
    paragraphRef: "Art 16"
    title: "Rules applicable to infringement and notices of remedial action"
    obligationType: "penalties"
    entityLevel: false
    notApplicableReason: "Article 16 establishes Member State infringement rules and remedial notices."
    encodable: false
    encodabilityReason: "sanctioning framework provision"
    checkType: "presence"
    evidenceRequired: []

  - id: "conflict_minerals.art17"
    articleRef: "Article 17"
    paragraphRef: "Art 17"
    title: "Member State reporting and Commission review"
    obligationType: "review_reporting"
    entityLevel: false
    notApplicableReason: "Article 17 imposes reporting and review duties on Member States and the Commission."
    encodable: false
    encodabilityReason: "institutional review provision"
    checkType: "presence"
    evidenceRequired: []

  - id: "conflict_minerals.art18"
    articleRef: "Article 18"
    paragraphRef: "Art 18"
    title: "Methodology for calculation of thresholds"
    obligationType: "threshold_methodology"
    entityLevel: false
    notApplicableReason: "Article 18 defines the Commission methodology for Annex I threshold calculation."
    encodable: false
    encodabilityReason: "threshold methodology provision"
    checkType: "presence"
    evidenceRequired: []

  - id: "conflict_minerals.art19"
    articleRef: "Article 19"
    paragraphRef: "Art 19"
    title: "Exercise of the delegation"
    obligationType: "delegated_acts"
    entityLevel: false
    notApplicableReason: "Article 19 concerns delegated powers of the Commission."
    encodable: false
    encodabilityReason: "institutional delegated powers provision"
    checkType: "presence"
    evidenceRequired: []

  - id: "conflict_minerals.art20"
    articleRef: "Article 20"
    paragraphRef: "Art 20"
    title: "Entry into force and date of application"
    obligationType: "final_provision"
    entityLevel: false
    notApplicableReason: "Article 20 is a final legislative provision on temporal application."
    encodable: false
    encodabilityReason: "entry-into-force provision"
    checkType: "presence"
    evidenceRequired: []

  # Annex dependencies
  - id: "conflict_minerals.annex_i"
    articleRef: "Annex I"
    paragraphRef: "Annex I"
    chapterId: "conflict_minerals.scope_definitions"
    chapterTitle: "Scope and Definitions"
    title: "Covered minerals, metals, CN codes, and thresholds"
    obligationType: "annex_dependency"
    encodable: false
    encodabilityReason: "requires structured annex table extraction before deterministic CN-code and threshold checks are complete"
    checkType: "presence"
    evidenceRequired: []

  - id: "conflict_minerals.annex_ii"
    articleRef: "Annex II"
    paragraphRef: "Annex II"
    chapterId: "conflict_minerals.due_diligence_obligations"
    chapterTitle: "Due Diligence Obligations"
    title: "Model supply chain policy dependencies"
    obligationType: "annex_dependency"
    encodable: false
    encodabilityReason: "annex supplies the model policy content against which Article 4 and Article 5 are interpreted"
    checkType: "presence"
    evidenceRequired: []

  - id: "conflict_minerals.annex_iii"
    articleRef: "Annex III"
    paragraphRef: "Annex III"
    chapterId: "conflict_minerals.due_diligence_obligations"
    chapterTitle: "Due Diligence Obligations"
    title: "Risk mitigation measures and indicators"
    obligationType: "annex_dependency"
    encodable: false
    encodabilityReason: "annex supplies the mitigation measures and indicators referenced in Article 5(3)"
    checkType: "presence"
    evidenceRequired: []
