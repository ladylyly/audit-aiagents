schemaVersion: "1.1"
regulation:
  id: "eu.directive.2024.1760"
  shortName: "CSDDD"
  citation: "Directive (EU) 2024/1760"
  sourcePdf: "thesis/sources/European Parliament and Council, Directive (EU) 2024:1760 on corporate sustainability due diligence, Official Journal of the European Union, 2024.pdf"
  notes:
    - "Paragraph-level starter encoding for Articles 1-15."
    - "External evidence deferred; VC claims + provenance only in v1."

rulepack:
  id: "csddd_eu_2024_1760_v1"
  version: "0.3.0"
  status: "draft"

chapters:
  - id: "csddd.scope_definitions"
    title: "Scope and Definitions"
    articleStart: 1
    articleEnd: 4
  - id: "csddd.governance_integration"
    title: "Governance and Integration"
    articleStart: 5
    articleEnd: 7
  - id: "csddd.due_diligence_process"
    title: "Due Diligence Process"
    articleStart: 8
    articleEnd: 15
  - id: "csddd.reporting_support"
    title: "Reporting and Support Measures"
    articleStart: 16
    articleEnd: 21
  - id: "csddd.climate_transition"
    title: "Climate Transition"
    articleStart: 22
    articleEnd: 22
  - id: "csddd.enforcement_liability"
    title: "Enforcement and Liability"
    articleStart: 23
    articleEnd: 39

rules:
  # Article 1 — Subject matter
  - id: "csddd.art1.1.a"
    articleRef: "Article 1"
    paragraphRef: "Art 1(1)(a)"
    title: "Obligations regarding adverse human rights and environmental impacts"
    obligationType: "statement_of_scope"
    encodable: false
    encodabilityReason: "statement of purpose; not a concrete compliance test"
    checkType: "presence"
    evidenceRequired: []

  - id: "csddd.art1.1.b"
    articleRef: "Article 1"
    paragraphRef: "Art 1(1)(b)"
    title: "Liability for violations"
    obligationType: "statement_of_scope"
    encodable: false
    encodabilityReason: "liability framing; enforcement handled elsewhere"
    checkType: "presence"
    evidenceRequired: []

  - id: "csddd.art1.1.c"
    articleRef: "Article 1"
    paragraphRef: "Art 1(1)(c)"
    title: "Transition plan for climate change mitigation"
    obligationType: "statement_of_scope"
    encodable: false
    encodabilityReason: "requires detailed plan quality assessment"
    checkType: "presence"
    evidenceRequired: []

  - id: "csddd.art1.2"
    articleRef: "Article 1"
    paragraphRef: "Art 1(2)"
    title: "No reduction of protection level"
    obligationType: "interpretive"
    encodable: false
    encodabilityReason: "legal interpretation of national protections"
    checkType: "presence"
    evidenceRequired: []

  - id: "csddd.art1.3"
    articleRef: "Article 1"
    paragraphRef: "Art 1(3)"
    title: "Without prejudice to other Union obligations"
    obligationType: "interpretive"
    encodable: false
    encodabilityReason: "cross-regime conflict analysis"
    checkType: "presence"
    evidenceRequired: []

  # Article 2 — Scope
  - id: "csddd.art2.1.a"
    articleRef: "Article 2"
    paragraphRef: "Art 2(1)(a)"
    title: "EU company threshold: employees + worldwide turnover"
    obligationType: "scope_gate"
    encodable: true
    checkType: "threshold"
    applicability:
      all:
        - field: "company.establishment"
          op: "in"
          value: ["eu_member_state"]
    conditions:
      all:
        - field: "company.avg_employee_count"
          op: ">"
          value: 1000
        - field: "company.net_turnover_eur_worldwide"
          op: ">"
          value: 450000000
    evidenceRequired:
      - "company.establishment"
      - "company.avg_employee_count"
      - "company.net_turnover_eur_worldwide"

  - id: "csddd.art2.1.b"
    articleRef: "Article 2"
    paragraphRef: "Art 2(1)(b)"
    title: "EU ultimate parent threshold: group employees + worldwide turnover"
    obligationType: "scope_gate"
    encodable: true
    checkType: "threshold"
    applicability:
      all:
        - field: "company.establishment"
          op: "in"
          value: ["eu_member_state"]
        - field: "company.is_ultimate_parent"
          op: "=="
          value: true
    conditions:
      all:
        - field: "group.avg_employee_count"
          op: ">"
          value: 1000
        - field: "group.net_turnover_eur_worldwide"
          op: ">"
          value: 450000000
    evidenceRequired:
      - "company.establishment"
      - "company.is_ultimate_parent"
      - "group.avg_employee_count"
      - "group.net_turnover_eur_worldwide"

  - id: "csddd.art2.1.c"
    articleRef: "Article 2"
    paragraphRef: "Art 2(1)(c)"
    title: "EU franchising/licensing threshold"
    obligationType: "scope_gate"
    encodable: true
    checkType: "threshold"
    applicability:
      all:
        - field: "company.establishment"
          op: "in"
          value: ["eu_member_state"]
    conditions:
      all:
        - field: "company.franchise_royalties_eur"
          op: ">"
          value: 22500000
        - field: "company.net_turnover_eur_worldwide"
          op: ">"
          value: 80000000
    evidenceRequired:
      - "company.establishment"
      - "company.franchise_royalties_eur"
      - "company.net_turnover_eur_worldwide"

  - id: "csddd.art2.2.a"
    articleRef: "Article 2"
    paragraphRef: "Art 2(2)(a)"
    title: "Third-country company threshold: EU turnover"
    obligationType: "scope_gate"
    encodable: true
    checkType: "threshold"
    applicability:
      all:
        - field: "company.establishment"
          op: "in"
          value: ["third_country"]
    conditions:
      all:
        - field: "company.net_turnover_eur_union"
          op: ">"
          value: 450000000
    evidenceRequired:
      - "company.establishment"
      - "company.net_turnover_eur_union"

  - id: "csddd.art2.2.b"
    articleRef: "Article 2"
    paragraphRef: "Art 2(2)(b)"
    title: "Third-country ultimate parent threshold: EU turnover"
    obligationType: "scope_gate"
    encodable: true
    checkType: "threshold"
    applicability:
      all:
        - field: "company.establishment"
          op: "in"
          value: ["third_country"]
        - field: "company.is_ultimate_parent"
          op: "=="
          value: true
    conditions:
      all:
        - field: "group.net_turnover_eur_union"
          op: ">"
          value: 450000000
    evidenceRequired:
      - "company.establishment"
      - "company.is_ultimate_parent"
      - "group.net_turnover_eur_union"

  - id: "csddd.art2.2.c"
    articleRef: "Article 2"
    paragraphRef: "Art 2(2)(c)"
    title: "Third-country franchising/licensing threshold"
    obligationType: "scope_gate"
    encodable: true
    checkType: "threshold"
    applicability:
      all:
        - field: "company.establishment"
          op: "in"
          value: ["third_country"]
    conditions:
      all:
        - field: "company.franchise_royalties_eur_union"
          op: ">"
          value: 22500000
        - field: "company.net_turnover_eur_union"
          op: ">"
          value: 80000000
    evidenceRequired:
      - "company.establishment"
      - "company.franchise_royalties_eur_union"
      - "company.net_turnover_eur_union"

  - id: "csddd.art2.5"
    articleRef: "Article 2"
    paragraphRef: "Art 2(5)"
    title: "Two consecutive financial years condition"
    obligationType: "scope_gate"
    encodable: false
    encodabilityReason: "requires multi-year financial history"
    checkType: "presence"
    evidenceRequired: []

  # Article 3 — Definitions
  - id: "csddd.art3.1"
    articleRef: "Article 3"
    paragraphRef: "Art 3(1)"
    title: "Definitions"
    obligationType: "definition"
    encodable: false
    encodabilityReason: "definitions used for interpretation, not direct checks"
    checkType: "presence"
    evidenceRequired: []

  # Article 4 — Level of harmonisation
  - id: "csddd.art4.1"
    articleRef: "Article 4"
    paragraphRef: "Art 4(1)"
    title: "No diverging national obligations for specified articles"
    obligationType: "interpretive"
    encodable: false
    encodabilityReason: "requires national law comparison"
    checkType: "presence"
    evidenceRequired: []

  - id: "csddd.art4.2"
    articleRef: "Article 4"
    paragraphRef: "Art 4(2)"
    title: "More stringent national provisions allowed for other articles"
    obligationType: "interpretive"
    encodable: false
    encodabilityReason: "requires national law comparison"
    checkType: "presence"
    evidenceRequired: []

  # Article 5 — Due diligence actions (a–h)
  - id: "csddd.art5.1.a"
    articleRef: "Article 5"
    paragraphRef: "Art 5(1)(a)"
    title: "Integrate due diligence into policies and risk management"
    obligationType: "policy_integration"
    encodable: true
    checkType: "presence"
    evidenceRequired:
      - "vc.claims.due_diligence_integration"

  - id: "csddd.art5.1.b"
    articleRef: "Article 5"
    paragraphRef: "Art 5(1)(b)"
    title: "Identify and assess adverse impacts"
    obligationType: "impact_assessment"
    encodable: true
    checkType: "presence"
    evidenceRequired:
      - "vc.claims.impact_identification_process"

  - id: "csddd.art5.1.c"
    articleRef: "Article 5"
    paragraphRef: "Art 5(1)(c)"
    title: "Prevent and mitigate potential impacts; end actual impacts"
    obligationType: "prevent_mitigate"
    encodable: true
    checkType: "presence"
    evidenceRequired:
      - "vc.claims.prevention_action_plan"

  - id: "csddd.art5.1.d"
    articleRef: "Article 5"
    paragraphRef: "Art 5(1)(d)"
    title: "Provide remediation for actual impacts"
    obligationType: "remediation"
    encodable: true
    checkType: "presence"
    evidenceRequired:
      - "vc.claims.remediation_process"

  - id: "csddd.art5.1.e"
    articleRef: "Article 5"
    paragraphRef: "Art 5(1)(e)"
    title: "Meaningful engagement with stakeholders"
    obligationType: "stakeholder_engagement"
    encodable: false
    encodabilityReason: "quality of engagement is not fully machine-checkable"
    checkType: "presence"
    evidenceRequired: []

  - id: "csddd.art5.1.f"
    articleRef: "Article 5"
    paragraphRef: "Art 5(1)(f)"
    title: "Notification mechanism and complaints procedure"
    obligationType: "grievance_mechanism"
    encodable: true
    checkType: "presence"
    evidenceRequired:
      - "vc.claims.complaint_channel_exists"
      - "vc.claims.complaint_procedure_documented"

  - id: "csddd.art5.1.g"
    articleRef: "Article 5"
    paragraphRef: "Art 5(1)(g)"
    title: "Monitoring effectiveness of due diligence"
    obligationType: "monitoring"
    encodable: true
    checkType: "presence"
    evidenceRequired:
      - "vc.claims.monitoring_frequency_months"

  - id: "csddd.art5.1.h"
    articleRef: "Article 5"
    paragraphRef: "Art 5(1)(h)"
    title: "Public communication on due diligence"
    obligationType: "reporting"
    encodable: true
    checkType: "presence"
    evidenceRequired:
      - "vc.claims.public_due_diligence_statement"

  # Article 6 — Group-level support
  - id: "csddd.art6.1"
    articleRef: "Article 6"
    paragraphRef: "Art 6(1)"
    title: "Parent company support at group level"
    obligationType: "group_support"
    encodable: false
    encodabilityReason: "requires corporate governance context"
    checkType: "presence"
    evidenceRequired: []

  # Article 7 — Due diligence policy
  - id: "csddd.art7.1"
    articleRef: "Article 7"
    paragraphRef: "Art 7(1)"
    title: "Due diligence policy exists and risk-based"
    obligationType: "policy_presence"
    encodable: true
    checkType: "boolean"
    evidenceRequired:
      - "vc.claims.due_diligence_policy_exists"

  - id: "csddd.art7.2.a"
    articleRef: "Article 7"
    paragraphRef: "Art 7(2)(a)"
    title: "Policy includes description of approach"
    obligationType: "policy_content"
    encodable: true
    checkType: "presence"
    evidenceRequired:
      - "vc.claims.policy_due_diligence_approach"

  - id: "csddd.art7.2.b"
    articleRef: "Article 7"
    paragraphRef: "Art 7(2)(b)"
    title: "Code of conduct covering company and partners"
    obligationType: "code_of_conduct"
    encodable: true
    checkType: "boolean"
    evidenceRequired:
      - "vc.claims.code_of_conduct_exists"

  - id: "csddd.art7.2.c"
    articleRef: "Article 7"
    paragraphRef: "Art 7(2)(c)"
    title: "Processes to integrate due diligence"
    obligationType: "policy_process"
    encodable: true
    checkType: "presence"
    evidenceRequired:
      - "vc.claims.due_diligence_integration_process"

  - id: "csddd.art7.3"
    articleRef: "Article 7"
    paragraphRef: "Art 7(3)"
    title: "Policy review/update at least every 24 months"
    obligationType: "policy_review"
    encodable: true
    checkType: "threshold"
    conditions:
      all:
        - field: "vc.claims.policy_review_interval_months"
          op: "<="
          value: 24
    evidenceRequired:
      - "vc.claims.policy_review_interval_months"

  # Article 8 — Identification and assessment
  - id: "csddd.art8.1"
    articleRef: "Article 8"
    paragraphRef: "Art 8(1)"
    title: "Identify and assess actual and potential impacts"
    obligationType: "impact_assessment"
    encodable: true
    checkType: "presence"
    evidenceRequired:
      - "vc.claims.impact_identification_process"

  - id: "csddd.art8.2.a"
    articleRef: "Article 8"
    paragraphRef: "Art 8(2)(a)"
    title: "Mapping operations and business partners"
    obligationType: "mapping"
    encodable: true
    checkType: "presence"
    evidenceRequired:
      - "vc.claims.supply_chain_mapping_completed"

  - id: "csddd.art8.2.b"
    articleRef: "Article 8"
    paragraphRef: "Art 8(2)(b)"
    title: "In-depth assessment in high-risk areas"
    obligationType: "impact_assessment"
    encodable: true
    checkType: "presence"
    evidenceRequired:
      - "vc.claims.in_depth_assessment"

  - id: "csddd.art8.3"
    articleRef: "Article 8"
    paragraphRef: "Art 8(3)"
    title: "Use of appropriate resources and reports"
    obligationType: "resources"
    encodable: false
    encodabilityReason: "resource suitability not fully machine-checkable"
    checkType: "presence"
    evidenceRequired: []

  - id: "csddd.art8.4"
    articleRef: "Article 8"
    paragraphRef: "Art 8(4)"
    title: "Prioritise requests to business partners"
    obligationType: "information_requests"
    encodable: false
    encodabilityReason: "requires contextual reasoning"
    checkType: "presence"
    evidenceRequired: []

  # Article 9 — Prioritisation
  - id: "csddd.art9.1"
    articleRef: "Article 9"
    paragraphRef: "Art 9(1)"
    title: "Prioritise impacts when not feasible to address all"
    obligationType: "prioritisation"
    encodable: true
    checkType: "presence"
    evidenceRequired:
      - "vc.claims.prioritisation_methodology"

  - id: "csddd.art9.2"
    articleRef: "Article 9"
    paragraphRef: "Art 9(2)"
    title: "Prioritisation based on severity and likelihood"
    obligationType: "prioritisation"
    encodable: true
    checkType: "presence"
    evidenceRequired:
      - "vc.claims.prioritisation_severity_likelihood"

  - id: "csddd.art9.3"
    articleRef: "Article 9"
    paragraphRef: "Art 9(3)"
    title: "Address less severe impacts after most severe"
    obligationType: "prioritisation"
    encodable: false
    encodabilityReason: "requires temporal sequencing evidence"
    checkType: "presence"
    evidenceRequired: []

  # Article 10 — Preventing potential adverse impacts
  - id: "csddd.art10.2.a"
    articleRef: "Article 10"
    paragraphRef: "Art 10(2)(a)"
    title: "Prevention action plan with timelines and indicators"
    obligationType: "prevention_action"
    encodable: true
    checkType: "presence"
    evidenceRequired:
      - "vc.claims.prevention_action_plan"

  - id: "csddd.art10.2.b"
    articleRef: "Article 10"
    paragraphRef: "Art 10(2)(b)"
    title: "Contractual assurances from business partners"
    obligationType: "contractual_assurances"
    encodable: true
    checkType: "presence"
    evidenceRequired:
      - "vc.claims.contractual_assurances_obtained"

  - id: "csddd.art10.2.c"
    articleRef: "Article 10"
    paragraphRef: "Art 10(2)(c)"
    title: "Investments or upgrades to prevent impacts"
    obligationType: "investments"
    encodable: true
    checkType: "presence"
    evidenceRequired:
      - "vc.claims.preventive_investments"

  - id: "csddd.art10.2.d"
    articleRef: "Article 10"
    paragraphRef: "Art 10(2)(d)"
    title: "Modifications to business plan or practices"
    obligationType: "business_plan_modifications"
    encodable: true
    checkType: "presence"
    evidenceRequired:
      - "vc.claims.business_plan_modifications"

  - id: "csddd.art10.2.e"
    articleRef: "Article 10"
    paragraphRef: "Art 10(2)(e)"
    title: "Support to SME business partners"
    obligationType: "sme_support"
    encodable: true
    checkType: "presence"
    evidenceRequired:
      - "vc.claims.sme_support_measures"

  - id: "csddd.art10.2.f"
    articleRef: "Article 10"
    paragraphRef: "Art 10(2)(f)"
    title: "Collaboration to prevent or mitigate impacts"
    obligationType: "collaboration"
    encodable: true
    checkType: "presence"
    evidenceRequired:
      - "vc.claims.collaboration_measures"

  # Article 11 — Bringing actual adverse impacts to an end
  - id: "csddd.art11.1"
    articleRef: "Article 11"
    paragraphRef: "Art 11(1)"
    title: "Measures to bring actual impacts to an end"
    obligationType: "corrective_action"
    encodable: true
    checkType: "presence"
    evidenceRequired:
      - "vc.claims.corrective_action_plan"

  - id: "csddd.art11.2"
    articleRef: "Article 11"
    paragraphRef: "Art 11(2)"
    title: "Minimise impacts when not immediately ended"
    obligationType: "corrective_action"
    encodable: true
    checkType: "presence"
    evidenceRequired:
      - "vc.claims.minimisation_measures"

  - id: "csddd.art11.3.a"
    articleRef: "Article 11"
    paragraphRef: "Art 11(3)(a)"
    title: "Neutralise or minimise impacts proportionately"
    obligationType: "corrective_action"
    encodable: false
    encodabilityReason: "proportionality requires legal judgement"
    checkType: "presence"
    evidenceRequired: []

  - id: "csddd.art11.3.b"
    articleRef: "Article 11"
    paragraphRef: "Art 11(3)(b)"
    title: "Corrective action plan with timelines and indicators"
    obligationType: "corrective_action"
    encodable: true
    checkType: "presence"
    evidenceRequired:
      - "vc.claims.corrective_action_plan"

  # Article 12 — Remediation
  - id: "csddd.art12.1"
    articleRef: "Article 12"
    paragraphRef: "Art 12(1)"
    title: "Provide remediation when company caused impact"
    obligationType: "remediation"
    encodable: true
    checkType: "presence"
    evidenceRequired:
      - "vc.claims.remediation_process"

  - id: "csddd.art12.2"
    articleRef: "Article 12"
    paragraphRef: "Art 12(2)"
    title: "Voluntary remediation for partner-caused impact"
    obligationType: "remediation"
    encodable: false
    encodabilityReason: "depends on discretionary business decisions"
    checkType: "presence"
    evidenceRequired: []

  # Article 13 — Stakeholder engagement
  - id: "csddd.art13.1"
    articleRef: "Article 13"
    paragraphRef: "Art 13(1)"
    title: "Effective engagement with stakeholders"
    obligationType: "stakeholder_engagement"
    encodable: false
    encodabilityReason: "requires qualitative assessment"
    checkType: "presence"
    evidenceRequired: []

  - id: "csddd.art13.3"
    articleRef: "Article 13"
    paragraphRef: "Art 13(3)"
    title: "Consultation at due diligence stages"
    obligationType: "stakeholder_engagement"
    encodable: false
    encodabilityReason: "requires qualitative assessment"
    checkType: "presence"
    evidenceRequired: []

  # Article 14 — Notification mechanism and complaints
  - id: "csddd.art14.1"
    articleRef: "Article 14"
    paragraphRef: "Art 14(1)"
    title: "Enable complaints regarding adverse impacts"
    obligationType: "grievance_mechanism"
    encodable: true
    checkType: "presence"
    evidenceRequired:
      - "vc.claims.complaint_channel_exists"

  - id: "csddd.art14.3"
    articleRef: "Article 14"
    paragraphRef: "Art 14(3)"
    title: "Fair, accessible complaints procedure"
    obligationType: "grievance_mechanism"
    encodable: true
    checkType: "presence"
    evidenceRequired:
      - "vc.claims.complaint_procedure_documented"

  # Article 15 — Monitoring
  - id: "csddd.art15"
    articleRef: "Article 15"
    paragraphRef: "Art 15"
    title: "Periodic monitoring at least every 12 months"
    obligationType: "monitoring"
    encodable: true
    checkType: "threshold"
    conditions:
      all:
        - field: "vc.claims.monitoring_frequency_months"
          op: "<="
          value: 12
    evidenceRequired:
      - "vc.claims.monitoring_frequency_months"

  # Article 16 — Communicating
  - id: "csddd.art16.1"
    articleRef: "Article 16"
    paragraphRef: "Art 16(1)"
    title: "Annual statement is published on the company website"
    obligationType: "reporting"
    encodable: true
    checkType: "presence"
    evidenceRequired:
      - "vc.claims.public_due_diligence_statement"

  - id: "csddd.art16.1.b"
    articleRef: "Article 16"
    paragraphRef: "Art 16(1)(b)"
    title: "Annual statement published no later than 12 months after balance sheet date"
    obligationType: "reporting_timing"
    encodable: true
    checkType: "threshold"
    conditions:
      all:
        - field: "vc.claims.public_statement_publication_delay_months"
          op: "<="
          value: 12
    evidenceRequired:
      - "vc.claims.public_statement_publication_delay_months"

  - id: "csddd.art16.2"
    articleRef: "Article 16"
    paragraphRef: "Art 16(2)"
    title: "CSRD reporting exemption"
    obligationType: "reporting_exemption"
    encodable: false
    encodabilityReason: "requires careful coordination with external sustainability reporting obligations"
    checkType: "presence"
    evidenceRequired: []

  # Article 17 — ESAP accessibility
  - id: "csddd.art17.1"
    articleRef: "Article 17"
    paragraphRef: "Art 17(1)"
    title: "Annual statement submitted to ESAP collection body"
    obligationType: "esap_submission"
    encodable: true
    checkType: "presence"
    evidenceRequired:
      - "vc.claims.esap_submission_completed"

  - id: "csddd.art17.1.a"
    articleRef: "Article 17"
    paragraphRef: "Art 17(1)(a)"
    title: "Statement submitted in extractable or machine-readable format"
    obligationType: "esap_format"
    encodable: true
    checkType: "presence"
    evidenceRequired:
      - "vc.claims.esap_machine_readable_format"

  - id: "csddd.art17.1.b"
    articleRef: "Article 17"
    paragraphRef: "Art 17(1)(b)"
    title: "Statement accompanied by required metadata"
    obligationType: "esap_metadata"
    encodable: true
    checkType: "presence"
    evidenceRequired:
      - "vc.claims.esap_metadata_complete"

  - id: "csddd.art17.2"
    articleRef: "Article 17"
    paragraphRef: "Art 17(2)"
