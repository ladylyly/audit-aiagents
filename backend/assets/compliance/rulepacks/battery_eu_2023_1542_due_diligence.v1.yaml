schemaVersion: "1.1"
regulation:
  id: "eu.regulation.2023.1542"
  shortName: "Battery Regulation"
  citation: "Regulation (EU) 2023/1542"
  sourcePdf: "thesis/sources/Regulation (EU) 2023:1542 (Battery Regulation) Official Journal text.pdf"
  notes:
    - "Phase 1 raw-material due diligence duties."
    - "Article 47 threshold and Article 48-52 management, verification, and disclosure duties."

rulepack:
  id: "battery_eu_2023_1542_due_diligence_v1"
  version: "0.1.0"
