chapters:
  - id: "battery.due_diligence"
    title: "Battery Due Diligence"
    articleStart: 47
    articleEnd: 53

rules:
  - id: "battery.art47"
    articleRef: "Article 47"
    paragraphRef: "Art 47"
    title: "Battery due diligence chapter applies only above the EUR 40 million threshold"
    obligationType: "scope_gate"
    encodable: true
    checkType: "threshold"
    applicability:
      all:
        - field: "input.assessmentDate"
          op: "date_on_or_after"
          value: "2025-08-18"
        - field: "claims.battery.operator_role"
          op: "in"
          value: ["manufacturer", "importer"]
        - field: "claims.battery.placed_on_union_market"
          op: "=="
          value: true
        - field: "claims.battery.status"
          op: "in"
          value: ["new", "original"]
    conditions:
      any:
        - field: "company.net_turnover_eur_last_financial_year"
          op: ">="
          value: 40000000
        - field: "group.net_turnover_eur_consolidated_last_financial_year"
          op: ">"
          value: 40000000
    evidenceRequired:
      - "company.net_turnover_eur_last_financial_year"
      - "group.net_turnover_eur_consolidated_last_financial_year"
      - "claims.battery.operator_role"
      - "claims.battery.placed_on_union_market"
      - "claims.battery.status"

