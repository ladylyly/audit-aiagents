schemaVersion: "1.1"
regulation:
  id: "eu.regulation.2023.1542"
  shortName: "Battery Regulation"
  citation: "Regulation (EU) 2023/1542"
  sourcePdf: "thesis/sources/Regulation (EU) 2023:1542 (Battery Regulation) Official Journal text.pdf"
  notes:
    - "Phase 2 sustainability and safety duties for Articles 6 to 12."
    - "Delegated-act thresholds remain gated through input.secondaryLegislationReady."

rulepack:
  id: "battery_eu_2023_1542_sustainability_v1"
  version: "0.1.0"
  status: "draft"

chapters:
  - id: "battery.substances"
    title: "Restrictions on Substances"
    articleStart: 6
    articleEnd: 6
  - id: "battery.carbon_footprint"
    title: "Carbon Footprint"
    articleStart: 7
    articleEnd: 7
  - id: "battery.recycled_content"
    title: "Recycled Content"
    articleStart: 8
    articleEnd: 8
  - id: "battery.performance_durability"
    title: "Performance and Durability"
    articleStart: 9
    articleEnd: 10
  - id: "battery.removability"
    title: "Removability and Replaceability"
    articleStart: 11
    articleEnd: 11
  - id: "battery.stationary_safety"
    title: "Safety of Stationary Battery Energy Storage Systems"
    articleStart: 12
    articleEnd: 12

rules:
  - id: "battery.art6.1"
    articleRef: "Article 6"
    paragraphRef: "Art 6(1)"
    title: "Battery complies with Annex I substance restrictions"
    obligationType: "product_requirement"
    encodable: true
    checkType: "boolean"
    evidenceRequired:
      - "claims.battery.annex_i_restrictions_compliant"

  - id: "battery.art7.1.ev"
    articleRef: "Article 7"
    paragraphRef: "Art 7(1)(a)"
    title: "Electric vehicle battery has a carbon footprint declaration"
    obligationType: "sustainability_disclosure"
    encodable: true
    checkType: "boolean"
    applicability:
      all:
        - field: "claims.battery.category"
          op: "=="
          value: "electric_vehicle"
        - field: "input.assessmentDate"
          op: "date_on_or_after"
          value: "2025-02-18"
        - field: "input.secondaryLegislationReady.article_7_methodology"
          op: "=="
          value: true
        - field: "input.secondaryLegislationReady.article_7_declaration_format"
          op: "=="
          value: true
    evidenceRequired:
      - "claims.battery.carbon_footprint_declaration_exists"

  - id: "battery.art7.1.industrial"
    articleRef: "Article 7"
    paragraphRef: "Art 7(1)(b)"
    title: "Rechargeable industrial battery above 2 kWh has a carbon footprint declaration"
    obligationType: "sustainability_disclosure"
    encodable: true
    checkType: "boolean"
    applicability:
      all:
        - field: "claims.battery.category"
          op: "=="
          value: "industrial"
        - field: "claims.battery.capacity_kwh"
          op: ">"
          value: 2
        - field: "claims.battery.has_external_storage"
          op: "=="
          value: false
        - field: "claims.battery.is_rechargeable"
          op: "=="
          value: true
        - field: "input.assessmentDate"
          op: "date_on_or_after"
          value: "2026-02-18"
        - field: "input.secondaryLegislationReady.article_7_methodology"
          op: "=="
          value: true
        - field: "input.secondaryLegislationReady.article_7_declaration_format"
          op: "=="
          value: true
    evidenceRequired:
      - "claims.battery.carbon_footprint_declaration_exists"

  - id: "battery.art7.1.lmt"
