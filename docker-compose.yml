services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "7002:7002"
    volumes:
      - ./backend/.env:/app/backend/.env:ro
      - ./data:/app/data
      - ./contracts/deploy_stack/output:/app/contracts/deploy_stack/output
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7002/api/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
